<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Survey</title>
  <style>
    body {
      font-family: Georgia, serif;
      background-color: #f0f4f8;
      color: #222;
      padding: 30px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 5px;
    }

    p.intro {
      color: #555;
      margin-bottom: 25px;
    }

    .form-card {
      background-color: #ffffff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 30px;
      max-width: 600px;
    }

    .form-row {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #aaa;
      border-radius: 4px;
      font-size: 14px;
      background-color: #fafafa;
    }

    fieldset {
      border: 1px solid #aaa;
      border-radius: 4px;
      padding: 12px 16px;
      margin-bottom: 18px;
    }

    legend {
      font-weight: bold;
      padding: 0 6px;
      color: #2c3e50;
    }

    .choice-item {
      margin: 6px 0;
    }

    .choice-item input {
      margin-right: 7px;
    }

    .btn-row {
      margin-top: 20px;
    }

    input[type="submit"],
    input[type="reset"] {
      padding: 8px 22px;
      font-size: 14px;
      border: 1px solid #aaa;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }

    input[type="submit"] {
      background-color: #2c7be5;
      color: white;
      border-color: #2c7be5;
    }

    input[type="reset"] {
      background-color: #eee;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Music Survey</h1>
  <p class="intro">Please fill out the form below to share your music preferences.</p>

  <div class="form-card">
    <form action="http://www.uyar.com/teaching/ecc006/2017spring/login.php" method="post">

      <div class="form-row">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" />
      </div>

      <div class="form-row">
        <label for="email">E-Mail Address:</label>
        <input type="email" id="email" name="email" />
      </div>

      <div class="form-row">
        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" cols="60" rows="3"></textarea>
      </div>

      <fieldset>
        <legend>How often do you listen to music?</legend>
        <div class="choice-item"><label><input type="radio" name="frequency" value="daily" /> Every day</label></div>
        <div class="choice-item"><label><input type="radio" name="frequency" value="several" /> Several times a week</label></div>
        <div class="choice-item"><label><input type="radio" name="frequency" value="weekends" /> Weekends only</label></div>
        <div class="choice-item"><label><input type="radio" name="frequency" value="rarely" /> Rarely</label></div>
      </fieldset>

      <fieldset>
        <legend>Favourite Genres:</legend>
        <div class="choice-item"><label><input type="checkbox" name="genre" value="pop" /> Pop</label></div>
        <div class="choice-item"><label><input type="checkbox" name="genre" value="rock" /> Rock</label></div>
        <div class="choice-item"><label><input type="checkbox" name="genre" value="jazz" /> Jazz</label></div>
        <div class="choice-item"><label><input type="checkbox" name="genre" value="classical" /> Classical</label></div>
        <div class="choice-item"><label><input type="checkbox" name="genre" value="hiphop" /> Hip-Hop</label></div>
      </fieldset>

      <div class="form-row">
        <label for="platform">Preferred Streaming Platform:</label>
        <select id="platform" name="platform" size="3">
          <option value="spotify">Spotify</option>
          <option value="apple">Apple Music</option>
          <option value="youtube">YouTube Music</option>
          <option value="tidal">Tidal</option>
          <option value="deezer">Deezer</option>
        </select>
      </div>

      <div class="btn-row">
        <input type="submit" value="Submit" />
        <input type="reset" value="Reset" />
      </div>

    </form>
  </div>

</body>
</html>
